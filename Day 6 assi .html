<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actor Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

h1{
    margin-top:25px;
    font-weight:bold;
    text-align:center;
}

.search-box{
    width:100%;
    padding:10px;
    margin:25px auto;
    border:2px solid #cfd8dc;
    border-radius:5px;
}

.card{
    transition:.3s;
    text-align:center;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0px 5px 15px rgba(0,0,0,.2);
}

.actor-img{

    width:100%;
    height:260px;
    object-fit:cover;
    display:none;
    margin-top:15px;
    border-radius:8px;

}

.btn{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Details</h1>

<input
type="text"
class="form-control search-box"
placeholder="Search Student"
id="search"
onkeyup="searchActor()">

<div class="row g-4">

<!-- Card 1 -->

<div class="col-md-4 actor">

<div class="card p-3">

<h5 class="mb-3 name">Charu jain</h5>

<button class="btn btn-primary"
onclick="showImage('img1')">
Show Image
</button>

<img
id="img1"
class="actor-img"
src="photo/charu..jpg.jpeg">

</div>

</div>

<!-- Card 2 -->

<div class="col-md-4 actor">

<div class="card p-3">

<h5 class="mb-3 name">Shyama ojha</h5>

<button class="btn btn-primary"
onclick="showImage('img2')">
Show Image
</button>

<img
id="img2"
class="actor-img"
src="photo/shyama..jpg.jpeg">

</div>

</div>

<!-- Card 3 -->

<div class="col-md-4 actor">

<div class="card p-3">

<h5 class="mb-3 name">Sannchhi khandewal</h5>

<button class="btn btn-primary"
onclick="showImage('img3')">
Show Image
</button>

<img
id="img3"
class="actor-img"
src="photo/Saanchi..jpg.jpeg">

</div>

</div>

</div>

</div>

<script>

function showImage(id){

let image=document.getElementById(id);

if(image.style.display==="block")
{
image.style.display="none";
}
else
{
image.style.display="block";
}

}

function searchActor(){

let input=document.getElementById("search").value.toLowerCase();

let actors=document.querySelectorAll(".actor");

actors.forEach(function(card){

let name=card.querySelector(".name").innerText.toLowerCase();

if(name.includes(input))
{
card.style.display="block";
}
else
{
card.style.display="none";
}

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Details</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#f4f7fc;
}

.container{
    width:90%;
    margin:auto;
    text-align:center;
}

h1{
    margin-top:30px;
    color:#333;
}

#search{
    width:60%;
    padding:12px;
    margin:30px;
    font-size:18px;
    border:2px solid #007bff;
    border-radius:8px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.card{

    width:250px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

button{

    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{

    background:#084ec4;
}

.details{

    margin-top:15px;
    display:none;
    text-align:left;
}

</style>

</head>
<body>

<div class="container">

<h1>Student Details</h1>

<input type="text" id="search" placeholder="Search Student..." onkeyup="searchStudent()">

<div class="cards">

<div class="card" id="shyama">

<h2>Shyama</h2>

<button onclick="show('detail1')">
Show Details
</button>

<div class="details" id="detail1">

<p><b>Name :</b> Shyama</p>

<p><b>Age :</b> 20</p>

<p><b>CGPA :</b> 8.95</p>

</div>

</div>



<div class="card" id="charu">

<h2>Charu</h2>

<button onclick="show('detail2')">
Show Details
</button>

<div class="details" id="detail2">

<p><b>Name :</b> Charu</p>

<p><b>Age :</b> 21</p>

<p><b>CGPA :</b> 9.12</p>

</div>

</div>

</div>

</div>

<script>

function show(id){

let x=document.getElementById(id);

if(x.style.display=="block")
{
x.style.display="none";
}
else
{
x.style.display="block";
}

}

function searchStudent(){

let input=document.getElementById("search").value.toLowerCase();

let shyama=document.getElementById("shyama");

let charu=document.getElementById("charu");

if(input=="")
{
shyama.style.display="block";
charu.style.display="block";
}

else if(input.startsWith("s"))
{
shyama.style.display="block";
charu.style.display="none";
}

else if(input.startsWith("c"))
{
charu.style.display="block";
shyama.style.display="none";
}

else
{
shyama.style.display="none";
charu.style.display="none";
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch the Fruits Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#b3ffab,#12fff7);
    overflow:hidden;
    height:100vh;
}

h1{
    text-align:center;
    margin-top:20px;
    color:#333;
}

.game-area{
    position:relative;
    width:100%;
    height:90vh;
}

.fruit{
    position:absolute;
    width:120px;
    cursor:pointer;
    transition:0.3s;
}

.fruit:hover{
    transform:scale(1.1);
}
</style>
</head>
<body>

<h1>Apple and Banana Game</h1>

<div class="game-area">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg"
class="fruit" id="banana"
style="left:100px; top:150px;">

<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"
class="fruit" id="apple"
style="left:500px; top:300px;">

</div>

<script>

const fruits=document.querySelectorAll(".fruit");

fruits.forEach(fruit=>{

    fruit.addEventListener("mouseenter",()=>{

        const maxX=window.innerWidth-150;
        const maxY=window.innerHeight-180;

        const randomX=Math.random()*maxX;
        const randomY=Math.random()*maxY;

        fruit.style.left=randomX+"px";
        fruit.style.top=randomY+"px";

    });

});

</script>

</body>
</html>
